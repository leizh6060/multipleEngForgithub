name: Create Semantic Tag and Release

on:
  push:
    branches:
      - main # Triggers the workflow when code is pushed to the main branch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Crucial permission allowing the action to create tags and releases

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required to fetch full history so the tagger can calculate the next version

      - name: Bump Version and Push Tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch # Bumps the patch version (x.x.1) if no special keywords are in commits

      - name: Create GitHub Release
        uses: ncipollo/release-action@v1
        with:
          tag: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          draft: false
          prerelease: false
