name: Multi-Environment Deployment

on:
  push:
    branches: [ main ]

jobs:
  
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Create Tag
        run: |
          # Fetch latest tag from remote, fallback to v0.0.0 if none exists
        LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "Latest tag found: $LATEST_TAG"
          
          # Remove 'v' prefix to isolate numbers
        VERSION=${LATEST_TAG#v}
          
          # Parse major, minor, and patch values
        IFS='.' read -r major minor patch <<< "$VERSION"
          
          # Increment the patch version by 1
        NEW_PATCH=$((patch + 1))
        NEW_TAG="v$major.$minor.$NEW_PATCH"
        echo "New tag to create: $NEW_TAG"
          
          # Create an annotated tag and push it
        git tag -a "$NEW_TAG" -m "Release $NEW_TAG [skip ci]"
        git push origin "$NEW_TAG"
      - name: Build Application
        run: echo "Building artifacts..."

  deploy-dev:
    needs: build
    runs-on: ubuntu-latest
    environment: development  # Links to GitHub Development Environment
    steps:
      - name: Deploy to Dev
        run: |
          echo "Deploying to Dev Server..."
          echo "API URL: ${{ vars.API_URL }}"
          echo "Token: ${{ secrets.DEPLOY_TOKEN }}"

  deploy-staging:
    needs: deploy-dev
    runs-on: ubuntu-latest
    environment: staging      # Links to GitHub Staging Environment
    steps:
      - name: Deploy to Staging
        run: |
          echo "Deploying to Staging Server..."
          echo "API URL: ${{ vars.API_URL }}"

  deploy-prod:
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production   # Links to GitHub Production Environment
    steps:
      - name: Deploy to Production
        run: |
          echo "Deploying to Production Server..."
          echo "API URL: ${{ vars.API_URL }}"
